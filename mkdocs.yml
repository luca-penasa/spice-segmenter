site_name: "Spice Segmenter"
repo_url: https://github.com/luca-penasa/spice-segmenter

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

nav:
  - Introduction: 'index.md'
  - Tutorial:
    - Simple usage: "tutorial/1. SimpleUsage.ipynb"
    - Coordinates: "tutorial/2. Coordinates.ipynb"
  - api_docs.md
  - changelog.md

markdown_extensions:
  - pymdownx.snippets:
      check_paths: true

plugins:  
  - with-pdf:
      enabled_if_env: ENABLE_PDF_EXPORT
  - mkdocs-jupyter:
      execute: false
  - search:
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          rendering:
            show_signature_annotations: false
            show_source: false
            show_submodules: false
            show_root_heading: true
          options:
            docstring_style: numpy
            heading_level: 2



